name: keep-warm

# Ping the Render free-tier API every 10 minutes to prevent the 15-min
# idle sleep. Cheap, fully managed by GitHub Actions, free for public repos.
#
# Setup:
#   1. Deploy the API to Render and get the URL (e.g. https://neo-theo-api.onrender.com).
#   2. On github.com/ibxibx/neo-theo go to Settings -> Secrets and variables ->
#      Actions -> Variables tab -> New repository variable.
#      Name: API_URL    Value: https://<your-render-url>
#   3. Save. The next scheduled run will pick it up.
#
# Note: GitHub may suspend scheduled workflows after 60 days of repo
# inactivity. Any push to main resets that timer.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::warning::API_URL repo variable is not set yet. Skipping."
            exit 0
          fi
          # Retry up to 3 times so a cold start does not flake the job.
          # 60s timeout on each attempt covers Render free-tier wake-up.
          for i in 1 2 3; do
            echo "Attempt $i: GET $API_URL/health"
            if curl --silent --show-error --max-time 60 --fail "$API_URL/health"; then
              echo ""
              echo "OK on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::All 3 ping attempts failed"
          exit 1
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neotheo-postgres
    environment:
      POSTGRES_USER: neotheo
      POSTGRES_PASSWORD: neotheo
      POSTGRES_DB: neotheo
    ports:
      - "5432:5432"
    volumes:
      - neotheo_pgdata:/var/lib/postgresql/data
      - ../packages/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  neotheo_pgdata:
